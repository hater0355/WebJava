<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Lý - Tổng quan</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar Fragment -->
        <div th:replace="~{fragments/sidebar :: sidebar('dashboard')}"></div>

        <!-- Main Content -->
        <div class="main-content">
            <h2 class="page-title">Bảng điều khiển</h2>

            <div style="display: flex; gap: 20px; margin-bottom: 30px;">
                <!-- Stat Card 1 -->
                <div class="stat-card" style="flex: 1; background-color: #1e3a8a;">
                    <h5 style="margin: 0 0 10px 0; font-size: 14px; font-weight: normal; color: #e0e7ff;">Tổng nhân viên (Đã duyệt)</h5>
                    <h2 style="margin: 0; font-size: 32px;" th:text="${totalEmps}">0</h2>
                </div>

                <!-- Stat Card 2 -->
                <div class="stat-card" style="flex: 1; background-color: #78350f;">
                    <h5 style="margin: 0 0 10px 0; font-size: 14px; font-weight: normal; color: #fef3c7;">Tổng quỹ lương cơ bản</h5>
                    <h2 style="margin: 0; font-size: 32px;" th:text="${#numbers.formatDecimal(totalSalary, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">0 VNĐ</h2>
                </div>
            </div>

            <!-- Content Card: Chart -->
            <div class="content-card">
                <h3 style="margin-top: 0; color: var(--text-secondary); font-size: 18px;">Cơ cấu quỹ lương theo phòng ban (Lương cơ bản)</h3>
                <div style="height: 400px; display: flex; align-items: center; justify-content: center; background-color: rgba(0,0,0,0.02); border-radius: 10px; border: 1px dashed var(--border-color); padding: 20px;">
                    <canvas id="salaryPieChart"></canvas>
                </div>
            </div>

        </div>
    </div>

    <!-- Script for Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:inline="javascript">
        /*<![CDATA[*/
        var chartLabels = /*[[${chartLabels}]]*/ [];
        var chartValues = /*[[${chartValues}]]*/ [];

        if (chartLabels.length > 0) {
            var ctx = document.getElementById('salaryPieChart').getContext('2d');
            
            // Generate some random colors based on data length
            var bgColors = [
                '#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#6366f1'
            ];
            
            var myChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        label: 'Quỹ lương cơ bản',
                        data: chartValues,
                        backgroundColor: bgColors.slice(0, chartLabels.length),
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: document.documentElement.getAttribute('data-theme') === 'dark' ? '#f3f4f6' : '#1f2937'
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.parsed !== null) {
                                        label += new Intl.NumberFormat('vi-VN').format(context.parsed) + ' VNĐ';
                                    }
                                    return label;
                                }
                            }
                        }
                    }
                }
            });
        } else {
            document.getElementById('salaryPieChart').outerHTML = '<p style="color: var(--text-secondary);">Chưa có dữ liệu</p>';
        }
        /*]]>*/
    </script>
</body>
</html>
