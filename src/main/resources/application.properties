spring.application.name=quanlyluong

# Cấu hình Database (Thay đổi theo máy của bạn)
spring.datasource.url=jdbc:mysql://localhost:3306/quanlyluong_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8081

# Cấu hình bổ sung để đảm bảo Web Server không bị tắt
spring.main.web-application-type=servlet
spring.main.allow-bean-definition-overriding=true
# Giữ log ở mức DEBUG để xem tại sao nó đóng (nếu cần)
# logging.level.org.springframework.web=DEBUG