spring:
  application:
    name: quanlyluong
  
  # Development Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/quanlyluong_dev?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # JPA & Hibernate Configuration (Development)
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

# Server Configuration
server:
  port: 8080

# Logging Configuration (Development)
logging:
  level:
    root: INFO
    com.company.quanlyluong: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/quanlyluong-dev.log

# Actuator Configuration (Development)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,beans

# Development Mode
app:
  mode: development
  debug: true
