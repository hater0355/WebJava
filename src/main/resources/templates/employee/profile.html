<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hồ Sơ Của Tôi - Nhân Viên</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="app-container">
        <div th:replace="~{fragments/employee_sidebar :: sidebar('profile')}"></div>

        <div class="main-content">
            <div class="header">
                <h2>👤 Hồ Sơ Cá Nhân</h2>
                <div class="user-info">
                    <span th:text="${employee.name}"></span>
                </div>
            </div>

            <div th:if="${param.success}" style="color: green; margin-bottom: 15px; padding: 10px; background: #e6ffed; border: 1px solid #b7ebc3; border-radius: 4px;">
                Cập nhật thông tin hồ sơ thành công!
            </div>

            <div th:if="${param.pwdSuccess}" style="color: green; margin-bottom: 15px; padding: 10px; background: #e6ffed; border: 1px solid #b7ebc3; border-radius: 4px;">
                Đổi mật khẩu thành công!
            </div>

            <div th:if="${param.pwdError}" style="color: red; margin-bottom: 15px; padding: 10px; background: #ffe6e6; border: 1px solid #ffb3b3; border-radius: 4px;">
                Mật khẩu hiện tại không đúng.
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card">
                    <h3>Thông Tin Chung (Chỉ Xem)</h3>
                    <div class="form-group">
                        <label>Mã Nhân Viên</label>
                        <input type="text" class="form-control" th:value="${employee.id}" readonly>
                    </div>
                    <div class="form-group">
                        <label>Họ Tên</label>
                        <input type="text" class="form-control" th:value="${employee.name}" readonly>
                    </div>
                    <div class="form-group">
                        <label>Phòng Ban</label>
                        <input type="text" class="form-control" th:value="${employee.department}" readonly>
                    </div>
                    <div class="form-group">
                        <label>Chức Vụ</label>
                        <input type="text" class="form-control" th:value="${employee.position}" readonly>
                    </div>
                    <div class="form-group">
                        <label>Lương Cơ Bản</label>
                        <input type="text" class="form-control" th:value="${#numbers.formatDecimal(employee.baseSalary, 0, 'COMMA', 0, 'POINT')} + ' VND'" readonly>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" class="form-control" th:value="${email}" readonly>
                    </div>
                    <div class="form-group">
                        <label>Số Điện Thoại</label>
                        <input type="text" class="form-control" th:value="${phone}" readonly>
                    </div>
                </div>

                <div>
                    <div class="card" style="margin-bottom: 20px;">
                        <h3>Cập Nhật Hồ Sơ</h3>
                        <form th:action="@{/employee/profile/update}" method="post">
                            <div class="form-group">
                                <label>Ngày Sinh</label>
                                <input type="date" name="dob" th:value="${employee.ngaySinh}" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Tình Trạng Hôn Nhân</label>
                                <select name="relationship" class="form-control" required>
                                    <option value="Độc thân" th:selected="${employee.giaDinh == 'Độc thân'}">Độc thân</option>
                                    <option value="Đã kết hôn" th:selected="${employee.giaDinh == 'Đã kết hôn'}">Đã kết hôn</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Số Điện Thoại Khẩn Cấp</label>
                                <input type="text" name="emergencyPhone" th:value="${employee.lienLacKhan}" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Số Người Phụ Thuộc</label>
                                <input type="number" name="dependents" th:value="${employee.nguoiPhuThuoc}" class="form-control" min="0" required>
                            </div>
                            <button type="submit" class="btn btn-primary" style="margin-top: 15px;">Lưu Hồ Sơ</button>
                        </form>
                    </div>

                    <div class="card">
                        <h3>Đổi Mật Khẩu</h3>
                        <form th:action="@{/employee/profile/change-password}" method="post">
                            <div class="form-group">
                                <label>Mật Khẩu Hiện Tại</label>
                                <input type="password" name="oldPassword" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Mật Khẩu Mới</label>
                                <input type="password" name="newPassword" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-warning" style="margin-top: 15px;">Đổi Mật Khẩu</button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
